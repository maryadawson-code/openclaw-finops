# Smithery.ai configuration for OpenClaw Integrity Suite

startCommand:
  type: remote
  url: https://openclaw-finops.marywomack.workers.dev/mcp
  transport: streamable-http
  headers:
    x-api-key: "${API_KEY}"

name: openclaw-finops
display_name: "OpenClaw Integrity Suite — FinOps + Security + API Verification"
description: >
  Stop AI agents from hallucinating cloud costs, fabricating API endpoints, and
  generating insecure Terraform. Four MCP servers solving the top four problems
  hitting vibe coders. Free tier: 25 ops/month.

categories:
  - DevOps
  - FinOps
  - Cloud
  - Security
  - AI Agents

tags:
  - mcp-server
  - cloud-pricing
  - finops
  - terraform
  - security-scanning
  - vibe-coding
  - aws
  - gcp
  - azure

configSchema:
  type: object
  required:
    - API_KEY
  properties:
    API_KEY:
      type: string
      title: API Key
      description: Your OpenClaw API key. Get one free — 25 ops/month, no credit card.
